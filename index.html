<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小天才語文學習樂園</title>
    <style>
        :root { --primary: #FFB6C1; --secondary: #87CEFA; --text: #333; }
        body { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; background: #FFF9E3; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        button { padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; font-size: 16px; transition: 0.3s; box-shadow: 0 4px #ccc; }
        button:active { transform: translateY(4px); box-shadow: none; }
        .btn-lang { background: var(--secondary); color: white; }
        .btn-age { background: var(--primary); color: white; }
        .active { filter: brightness(0.8); border: 2px solid #555; }
        
        .card { background: white; width: 90%; max-width: 500px; border-radius: 30px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; }
        .illustration { font-size: 80px; margin-bottom: 20px; }
        .dialogue-box { text-align: left; background: #f0f0f0; padding: 15px; border-radius: 15px; margin-top: 10px; cursor: pointer; }
        .dialogue-box:hover { background: #e0e0e0; }
        .translation { font-size: 14px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌟 小天才語文學習樂園 🌟</h1>
        <p>點選年齡與語言，開始冒險吧！</p>
    </div>

    <div class="controls">
        <button class="btn-lang active" onclick="setLang('en')">English 🇺🇸</button>
        <button class="btn-lang" onclick="setLang('jp')">日本語 🇯🇵</button>
    </div>

    <div class="controls">
        <button class="btn-age active" onclick="setAge('4-6')">4-6 歲</button>
        <button class="btn-age" onclick="setAge('7-8')">7-8 歲</button>
        <button class="btn-age" onclick="setAge('9-12')">9-12 歲</button>
    </div>

    <div id="content-area" class="card">
        </div>

<script>
    let currentLang = 'en';
    let currentAge = '4-6';

    // 模擬資料庫
    const database = {
        'en': {
            '4-6': { topic: 'Fruits', emoji: '🍎', text: 'A: I have four apples.\nB: Yummy! I like apples.', trans: 'A: 我有四顆蘋果。\nB: 真好吃！我喜歡蘋果。' },
            '7-8': { topic: 'Weather', emoji: '☀️', text: 'A: How is the weather today?\nB: It is sunny and hot!', trans: 'A: 今天天氣如何？\nB: 天氣晴朗而且很熱！' },
            '9-12': { topic: 'Hobby', emoji: '🎨', text: 'A: What do you like to do after school?\nB: I enjoy painting beautiful pictures.', trans: 'A: 你放學後喜歡做什麼？\nB: 我喜歡畫漂亮的圖畫。' }
        },
        'jp': {
            '4-6': { topic: 'くだもの', emoji: '🍎', text: 'A: りんごが よんこ あります。\nB: おいしい！りんごが だいすき。', trans: 'A: 有四顆蘋果。\nB: 好吃！最喜歡蘋果了。' },
            '7-8': { topic: 'てんき', emoji: '☀️', text: 'A: きょうの てんきは どうですか？\nB: はれです！とても あついです。', trans: 'A: 今天天氣如何？\nB: 是晴天！非常熱。' },
            '9-12': { topic: 'しゅみ', emoji: '🎨', text: 'A: 放課後は何をすることが好きですか？\nB: 綺麗な絵を描くのが楽しいです。', trans: 'A: 放學後喜歡做什麼？\nB: 畫漂亮的圖畫很有趣。' }
        }
    };

    function setLang(lang) {
        currentLang = lang;
        updateUI();
    }

    function setAge(age) {
        currentAge = age;
        updateUI();
    }

    function updateUI() {
        // 更新按鈕樣式
        document.querySelectorAll('.btn-lang').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(currentLang)));
        document.querySelectorAll('.btn-age').forEach(b => b.classList.toggle('active', b.innerText.includes(currentAge)));

        const data = database[currentLang][currentAge];
        const contentArea = document.getElementById('content-area');
        
        contentArea.innerHTML = `
            <h2>${data.topic}</h2>
            <div class="illustration">${data.emoji}</div>
            <div class="dialogue-box" onclick="speak('${data.text.replace(/\n/g, ' ')}')">
                <p><strong>${data.text.replace(/\n/g, '<br>')}</strong></p>
                <p class="translation">${data.trans.replace(/\n/g, '<br>')}</p>
                <small style="color:blue;">(點擊對話可聽語音 🔊)</small>
            </div>
        `;
    }

    function speak(text) {
        // 使用瀏覽器內建語音 API
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = currentLang === 'en' ? 'en-US' : 'ja-JP';
        utterance.rate = 0.8; // 設定語速 0.8
        window.speechSynthesis.speak(utterance);
    }

    // 初始化網頁
    updateUI();
</script>

</body>
</html>
